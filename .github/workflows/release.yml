name: Build and Release

# Triggers:
#   - Pushing a tag like v2.0.2 (the standard release path)
#   - Manual run from the Actions tab (for re-running a failed release)
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

# GITHUB_TOKEN needs write access to create the release and upload assets.
permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match package.json version $PKG"
            exit 1
          fi
          echo "Tag v$TAG matches package.json version $PKG"

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer and publish to GitHub Releases
        env:
          # Auto-provided by Actions; needs `contents: write` (above).
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --publish always
